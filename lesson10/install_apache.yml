---

- hosts: web_server 
  become: true
  vars:
    ansible_python_interpreter: auto_silent
  tasks:

  - name: install apache2 package
    apt:
      tags: web_server
      name: 
        - apache2
      state: latest

  - name: install php package
    apt:
      name:
        - libapache2-mod-php
      state: latest
